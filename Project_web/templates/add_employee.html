<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard | PahelaPride</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* ======= PahelaPride Theme ======= */
    body {
      background: linear-gradient(135deg, #ff4d6d, #ff758f, #ffc2d1);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #333;
    }

    .navbar {
      background: linear-gradient(90deg, #d6336c, #ff4d6d);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    .navbar-brand {
      font-weight: 600;
      letter-spacing: 1px;
    }

    .card {
      border: none;
      border-radius: 16px;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    }

    .card-body {
      border-radius: 16px;
    }

    .bg-info {
      background-color: #ff85a1 !important;
    }

    .bg-warning {
      background-color: #ffccd5 !important;
      color: #5c0000 !important;
    }

    .bg-success {
      background-color: #c9184a !important;
    }

    h2.text-primary {
      color: #fff !important;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/admin/dashboard">Admin Panel</a>
    <ul class="navbar-nav ms-auto">
      <li class="nav-item"><a class="nav-link" href="/admin/dashboard">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link" href="/admin/employees">Employees</a></li>
      <li class="nav-item"><a class="nav-link" href="/admin/salary">Salary</a></li>
      <li class="nav-item"><a class="nav-link" href="/logout">Logout</a></li>
    </ul>
  </div>
</nav>

<div class="container mt-4">
  <h3 class="text-primary mb-3">Add New Employee</h3>

  <form method="POST" action="/admin/employees/add">
    <div class="mb-3">
      <label>Name</label>
      <input type="text" name="name" class="form-control" required>
    </div>
    <div class="mb-3">
      <label>Position</label>
      <input type="text" name="position" class="form-control" required>
    </div>
    <div class="mb-3">
      <label>Join Date</label>
      <input type="date" name="join_date" class="form-control" required>
    </div>
    <div class="mb-3">
      <label>Department</label>
      <select name="department_id" class="form-select" required>
        {% for d in departments %}
          <option value="{{ d[0] }}">{{ d[1] }}</option>
        {% endfor %}
      </select>
    </div>
    <button type="submit" class="btn btn-success">Add Employee</button>
    <a href="/admin/employees" class="btn btn-secondary">Cancel</a>
  </form>
</div>

</body>
</html>
